<!DOCTYPE html>
<html>
<head>
    <title>Тест: Русский → Татарский</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Тест перевода с русского на татарский</h1>

        <div class="mb-3">
            <input type="text" id="textInput" class="form-control" value="Привет" placeholder="Введите русский текст">
        </div>

        <button onclick="testTranslate()" class="btn btn-primary">Перевести</button>

        <div id="result" class="mt-3 p-3 border"></div>

        <div class="mt-4">
            <h4>Примеры для теста:</h4>
            <button onclick="setText('Привет')" class="btn btn-sm btn-outline-secondary">Привет</button>
            <button onclick="setText('Спасибо')" class="btn btn-sm btn-outline-secondary">Спасибо</button>
            <button onclick="setText('Добро пожаловать')" class="btn btn-sm btn-outline-secondary">Добро пожаловать</button>
            <button onclick="setText('Как дела')" class="btn btn-sm btn-outline-secondary">Как дела</button>
            <button onclick="setText('Я тебя люблю')" class="btn btn-sm btn-outline-secondary">Я тебя люблю</button>
        </div>
    </div>

    <script>
        function setText(text) {
            document.getElementById('textInput').value = text;
            testTranslate();
        }

        async function testTranslate() {
            const text = document.getElementById('textInput').value;

            try {
                const response = await fetch('/api/QuickTranslate/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        Text: text,
                        SourceLang: 'ru',
                        TargetLang: 'tt'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('result').innerHTML = `
                        <div class="alert alert-success">
                            <strong>Оригинал (русский):</strong> ${data.original}<br>
                            <strong>Перевод (татарский):</strong> ${data.translated}<br>
                            <small class="text-muted">Время: ${new Date(data.timestamp).toLocaleTimeString()}</small>
                        </div>
                    `;
                } else {
                    document.getElementById('result').innerHTML = `
                        <div class="alert alert-danger">
                            Ошибка: ${data.error}
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <div class="alert alert-danger">
                        Ошибка соединения: ${error.message}
                    </div>
                `;
            }
        }

        // Автоматический тест при загрузке
        window.onload = testTranslate;
    </script>
</body>
</html>
